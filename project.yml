name: Happy
options:
  bundleIdPrefix: com.happy
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    PRODUCT_BUNDLE_IDENTIFIER: com.happy.golf
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  Happy:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Happy
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        INFOPLIST_FILE: Happy/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.happy.golf
        TARGETED_DEVICE_FAMILY: "1"
    scheme:
      testTargets: []
