name: Happy
options:
  bundleIdPrefix: com.joinhappygolf
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.5.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: P8CF8C6DX7
    PRODUCT_BUNDLE_IDENTIFIER: com.joinhappygolf.app
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  Happy:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Happy
    dependencies:
      - package: Supabase
        product: Supabase
    settings:
      base:
        INFOPLIST_FILE: Happy/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.joinhappygolf.app
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: Happy/Happy.entitlements
    scheme:
      testTargets:
        - HappyTests
        - HappyUITests

  HappyTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HappyTests
    dependencies:
      - target: Happy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joinhappygolf.tests
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES

  HappyUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HappyUITests
    dependencies:
      - target: Happy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joinhappygolf.uitests
        TEST_TARGET_NAME: Happy
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
